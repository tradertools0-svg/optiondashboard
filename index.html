<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jarvis Option Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard-container">
    <h1 class="title">TREADETOOLS | JARVIS HUD Dashboard</h1>
    <div class="tiles">
      <div class="tile" id="spotPrice">Spot Price: ₹--</div>
      <div class="tile" id="atmStrike">ATM Strike: ₹--</div>
      <div class="tile" id="ceLtp">CE LTP: ₹--</div>
      <div class="tile" id="peLtp">PE LTP: ₹--</div>
      <div class="tile" id="ceDelta">CE Δ: --</div>
      <div class="tile" id="peDelta">PE Δ: --</div>
      <div class="tile" id="ltpDiff">LTP Diff: ₹--</div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
